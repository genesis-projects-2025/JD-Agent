# agent_config.yaml
# Global defaults and agent configurations for the AI-Engineer ecosystem

defaults:
  max_loops: 15
  safety_check: true
  temperature: 0.2

agents:
  planner_agent:
    model: gemini-2.5-pro
    temperature: 0.1
  code_writer_agent:
    model: gemini-2.5-flash
    temperature: 0.3
  jd_synthesis_agent:
    model: gemini-2.5-pro
    temperature: 0.5\n