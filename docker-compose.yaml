services:
  # Backend service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jd-agent-backend:1.0.0
    container_name: jd-agent-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/venv # Prevent local venv from overriding container node_modules
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/dbname
    depends_on:
      - db
      - redis
    networks:
      - app-network

   # Frontend service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: jd-agent-frontend:1.0.0
    container_name: jd-agent-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/.next # Prevent local .next from overriding container build
      - /app/node_modules # Prevent local node_modules from overriding
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - app-network

  # Database service
  db:
    image: postgres:15
    container_name: jd-agent-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dbname
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-network

  # Redis service
  redis:
    image: redis:7-alpine
    container_name: jd-agent-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
  redis_data:
